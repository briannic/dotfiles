# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
setw -g mode-keys vi

# ── Splits (open in current pane's path) ──────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Vim-style pane navigation ─────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Vim-style pane resize (repeatable) ────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Copy mode (vi-style) ──────────────────────────────────────────────
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green,bold][#S] "
set -g status-left-length 30
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
setw -g window-status-current-style "fg=black,bg=green,bold"
